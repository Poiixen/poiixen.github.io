<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirect</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background: #1C1C22;
            font-family: sans-serif;
        }

        video {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            min-width: 100%;
            min-height: 100%;
            object-fit: cover;
            display: none;
        }

        video.playing {
            display: block;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            cursor: pointer;
            z-index: 10;
        }
    </style>
</head>

<body>

    <div id="overlay">
        <h1>Continue</h1>
    </div>

    <video id="myVideo" playsinline loop preload="auto">
        <source src="/r/assets/video.mp4" type="video/mp4">
    </video>

    <script>
        const video = document.getElementById('myVideo');
        const overlay = document.getElementById('overlay');

        overlay.addEventListener('click', () => {
            overlay.innerHTML = "";
            setTimeout(() => {
                overlay.style.display = 'none';
                video.classList.add('playing');
                video.play();
            }, 1200);
        });
    </script>
</body>

</html>
